<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Georgia', serif; }

    #hud {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center; z-index: 100; pointer-events: none;
    }
    .hud-pill {
      background: rgba(0,0,0,0.50); backdrop-filter: blur(6px);
      color: #fff; font-size: 13px; padding: 7px 18px; border-radius: 30px;
      letter-spacing: 0.04em; white-space: nowrap; border: 1px solid rgba(255,255,255,0.15);
    }
    .hud-pill kbd {
      background: rgba(255,255,255,0.18); border-radius: 4px;
      padding: 1px 5px; font-size: 11px; font-family: monospace;
    }
    #tooltip {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -120px);
      background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
      color: #fff; padding: 10px 22px; border-radius: 16px; font-size: 15px;
      border: 1px solid rgba(255,255,255,0.2); pointer-events: none;
      opacity: 0; transition: opacity 0.3s; z-index: 120; text-align: center;
    }
    #tooltip.show { opacity: 1; }
    #joystick-wrap {
      position: fixed; bottom: 80px; left: 30px; z-index: 110;
      display: none; touch-action: none;
    }
    @media (pointer: coarse) { #joystick-wrap { display: block; } }
    #joystick-base {
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
      position: relative;
    }
    #joystick-knob {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.55); position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
  </style>
</head>

<script>
 
  /* Mobile joystick */
  const jBase  = document.getElementById('joystick-base');
  const jKnob  = document.getElementById('joystick-knob');
  let jActive = false, jOrigin = {x:0,y:0}, jDelta = {x:0,y:0};
  const JR = 33;
  jBase.addEventListener('touchstart', e => {
    e.preventDefault(); jActive = true;
    const r = jBase.getBoundingClientRect();
    jOrigin = { x: r.left + r.width/2, y: r.top + r.height/2 };
  }, {passive: false});
  document.addEventListener('touchmove', e => {
    if (!jActive) return; e.preventDefault();
    const t = e.touches[0];
    let dx = t.clientX - jOrigin.x, dy = t.clientY - jOrigin.y;
    const d = Math.min(Math.hypot(dx, dy), JR), a = Math.atan2(dy, dx);
    dx = Math.cos(a)*d; dy = Math.sin(a)*d;
    jKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    jDelta = { x: dx/JR, y: dy/JR };
  }, {passive: false});
  document.addEventListener('touchend', () => {
    jActive = false; jDelta = {x:0,y:0};
    jKnob.style.transform = 'translate(-50%,-50%)';
  });
  setInterval(() => {
    if (!jActive || (!jDelta.x && !jDelta.y)) return;
    const rig = document.getElementById('rig');
    const cam = document.getElementById('cam');
    const pos = rig.object3D.position;
    const yaw = cam.object3D.rotation.y;
    const s   = 0.06;
    pos.x += (Math.cos(yaw)*-jDelta.x - Math.sin(yaw)*jDelta.y)*s;
    pos.z += (Math.sin(yaw)*-jDelta.x + Math.cos(yaw)*jDelta.y)*s;
  }, 1000/60);
</script>
